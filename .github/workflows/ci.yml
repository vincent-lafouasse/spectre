name: CI

on:
  push:
  pull_request:

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: sudo apt-get update -q && sudo apt-get install -y cmake gcc libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build

      - name: Build — Raylib
        run: cmake --build build --target raylib

      - name: Build — Kiss-fft
        run: cmake --build build --target kissfft

      - name: Build — LockFreeQueue
        run: cmake --build build --target LockFreeQueue

      - name: Build — Native binary
        run: cmake --build build --target spectre

